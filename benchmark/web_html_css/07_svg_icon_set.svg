<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Color Gradient -->
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052a3;stop-opacity:1" />
    </linearGradient>

    <!-- Icon Set Symbols -->
    <symbol id="icon-home" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M3 13h2v8h14v-8h2V9.98c0-.06-.01-.12-.02-.17l-8-14.45-.98 1.63-8 14.45c-.01.05-.02.11-.02.17V13z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-user" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <circle cx="12" cy="8" r="5" fill="currentColor"/>
      <path d="M12 14c-5.33 0-8 2.67-8 5v3h16v-3c0-2.33-2.67-5-8-5z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-search" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <circle cx="10" cy="10" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M14 14l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <symbol id="icon-settings" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <circle cx="12" cy="12" r="2" fill="currentColor"/>
      <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.37-2.65c-.04-.24-.24-.41-.48-.41h-4c-.24 0-.44.17-.49.41l-.37 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.37 2.65c.05.24.25.41.49.41h4c.24 0 .44-.17.49-.41l.37-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-alert" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-check" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-close" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-menu" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <rect x="2" y="4" width="20" height="2" fill="currentColor"/>
      <rect x="2" y="11" width="20" height="2" fill="currentColor"/>
      <rect x="2" y="18" width="20" height="2" fill="currentColor"/>
    </symbol>

    <symbol id="icon-arrow-right" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M5 13h14v-2H5v2z" fill="currentColor"/>
      <path d="M10 19l7-7-7-7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <symbol id="icon-download" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-star" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2l-2.81 6.63L2 9.24l5.46 4.73L5.82 21z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-heart" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-bell" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-calendar" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-code" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z" fill="currentColor"/>
    </symbol>

    <symbol id="icon-lock" viewBox="0 0 24 24" preserveAspectRatio="xMidYMid meet">
      <path d="M18 8h-1V6c0-2.76-2.24-5-5-5s-5 2.24-5 5v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6-2c1.66 0 3 1.34 3 3v2H9V6c0-1.66 1.34-3 3-3zm3 13c0 .55-.45 1-1 1s-1-.45-1-1-.45-1-1-1-1 .45-1 1-.45 1-1 1-1-.45-1-1 .45-1 1-1 1 .45 1 1z" fill="currentColor"/>
    </symbol>
  </defs>

  <!-- Display Icons with gradient -->
  <g id="icon-display">
    <!-- Icon 1: Home -->
    <g transform="translate(10, 10)">
      <circle cx="0" cy="0" r="8" fill="url(#grad-primary)" opacity="0.1"/>
      <use xlink:href="#icon-home" width="16" height="16" x="-8" y="-8" fill="url(#grad-primary)"/>
      <title role="img" aria-label="Home icon">Home</title>
    </g>

    <!-- Icon 2: User -->
    <g transform="translate(40, 10)">
      <circle cx="0" cy="0" r="8" fill="#22c55e" opacity="0.1"/>
      <use xlink:href="#icon-user" width="16" height="16" x="-8" y="-8" fill="#22c55e"/>
      <title role="img" aria-label="User profile icon">User</title>
    </g>

    <!-- Icon 3: Search -->
    <g transform="translate(70, 10)">
      <circle cx="0" cy="0" r="8" fill="#eab308" opacity="0.1"/>
      <use xlink:href="#icon-search" width="16" height="16" x="-8" y="-8" fill="#eab308"/>
      <title role="img" aria-label="Search icon">Search</title>
    </g>

    <!-- Icon 4: Settings -->
    <g transform="translate(10, 40)">
      <circle cx="0" cy="0" r="8" fill="#ef4444" opacity="0.1"/>
      <use xlink:href="#icon-settings" width="16" height="16" x="-8" y="-8" fill="#ef4444"/>
      <title role="img" aria-label="Settings icon">Settings</title>
    </g>

    <!-- Icon 5: Alert -->
    <g transform="translate(40, 40)">
      <circle cx="0" cy="0" r="8" fill="#ec4899" opacity="0.1"/>
      <use xlink:href="#icon-alert" width="16" height="16" x="-8" y="-8" fill="#ec4899"/>
      <title role="img" aria-label="Alert icon">Alert</title>
    </g>

    <!-- Icon 6: Check -->
    <g transform="translate(70, 40)">
      <circle cx="0" cy="0" r="8" fill="#06b6d4" opacity="0.1"/>
      <use xlink:href="#icon-check" width="16" height="16" x="-8" y="-8" fill="#06b6d4"/>
      <title role="img" aria-label="Check icon">Checkmark</title>
    </g>

    <!-- Icon 7: Close -->
    <g transform="translate(10, 70)">
      <circle cx="0" cy="0" r="8" fill="#8b5cf6" opacity="0.1"/>
      <use xlink:href="#icon-close" width="16" height="16" x="-8" y="-8" fill="#8b5cf6"/>
      <title role="img" aria-label="Close icon">Close</title>
    </g>

    <!-- Icon 8: Menu -->
    <g transform="translate(40, 70)">
      <circle cx="0" cy="0" r="8" fill="#f97316" opacity="0.1"/>
      <use xlink:href="#icon-menu" width="16" height="16" x="-8" y="-8" fill="#f97316"/>
      <title role="img" aria-label="Menu icon">Menu</title>
    </g>

    <!-- Icon 9: Arrow Right -->
    <g transform="translate(70, 70)">
      <circle cx="0" cy="0" r="8" fill="#14b8a6" opacity="0.1"/>
      <use xlink:href="#icon-arrow-right" width="16" height="16" x="-8" y="-8" fill="#14b8a6"/>
      <title role="img" aria-label="Arrow right icon">Next</title>
    </g>
  </g>

  <!-- Additional paths with advanced SVG features -->
  <defs>
    <!-- Radial Gradient -->
    <radialGradient id="grad-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </radialGradient>

    <!-- Pattern -->
    <pattern id="pattern-dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#ddd"/>
    </pattern>

    <!-- Filter: Drop Shadow -->
    <filter id="filter-shadow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip Path -->
    <clipPath id="clip-circle">
      <circle cx="12" cy="12" r="10"/>
    </clipPath>
  </defs>

  <!-- Demonstration of advanced SVG features -->
  <g id="advanced-demos">
    <!-- Using Radial Gradient -->
    <circle cx="15" cy="95" r="5" fill="url(#grad-radial)"/>

    <!-- Using Pattern -->
    <rect x="25" y="90" width="10" height="10" fill="url(#pattern-dots)" stroke="#999" stroke-width="0.5"/>

    <!-- Using Filter -->
    <text x="40" y="100" font-size="6" fill="#333" filter="url(#filter-shadow)">Effects</text>

    <!-- Using Clip Path -->
    <g clip-path="url(#clip-circle)">
      <rect x="50" y="85" width="20" height="20" fill="url(#grad-primary)"/>
    </g>
  </g>

  <!-- Accessibility metadata -->
  <metadata>
    <description>Icon set for web application. Contains 12 icons with gradient fills and accessibility labels.</description>
  </metadata>
</svg>
